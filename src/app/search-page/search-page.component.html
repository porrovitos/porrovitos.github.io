<div class="form-group">
    <label for="exampleFormControlSelect1">Select Fandom</label>
    <select class="form-control" id="exampleFormControlSelect1" (change)="selectChangeHandler($event)">
        <option *ngFor="let fandom of fandoms" 
        [value]="fandom.fandom_name" >
            {{fandom.fandom_name}}
        </option>
    </select>
    <button type="button" (click)="searchFanfics()">Search Fanfics</button>
    <div *ngFor="let fanfic of fanfics">
        <section class="home-blog bg-sand">
            
          <div class="container">
    
        
          <!-- section title ends -->
            <div class="row ">
                <a a routerLink="/fanfic/id/{{fanfic.id}}">
              <div class="col-md-6">
                <div class="media blog-media">
                  <a><img class="d-flex" src="https://via.placeholder.com/350x380/6495ED/000000" alt="Generic placeholder image"></a>
                  <div class="media-body">
                    <a href=""><h5 class="mt-0">{{fanfic.fanfic_name}}</h5></a>
                    Sodales aliquid, in eget ac cupidatat velit autem numquam ullam ducimus occaecati placeat error.
                    <ul>
                      <li>by: {{fanfic.user_username}}</li>
                      <li class="text-right">{{fanfic.count_likes}} likes</li>
                    </ul>
                    <ul>
                      <li>Creation Date: {{fanfic.creation_date}}</li>
                    </ul>
                  </div>
                </div>
              </div>
            </a>
            </div>
          </div>
        </section>
    </div>
    
  </div>
