<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="">
  <meta name="author" content="Mark Otto, Jacob Thornton, and Bootstrap contributors">
  <meta name="generator" content="Hugo 0.84.0">
  <title>Signin Template · Bootstrap v5.0</title>

  <link rel="canonical" href="https://getbootstrap.com/docs/5.0/examples/sign-in/">


  <style>
    .bd-placeholder-img {
      font-size: 1.125rem;
      text-anchor: middle;
      -webkit-user-select: none;
      -moz-user-select: none;
      user-select: none;
    }

    @media (min-width: 768px) {
      .bd-placeholder-img-lg {
        font-size: 3.5rem;
      }
    }
  </style>
</head>

<body class="text-center">

  <main class="form-signin">
    <form [formGroup]="form" (submit)="register()">
      <h1 class="h3 mb-3 fw-normal">Please register</h1>
      <div class="form-floating">
        <mat-form-field class="example-full-width" appearance="fill">
          <mat-label>Your nickname</mat-label>
          <input matInput formControlName="username" type="text" id="floatingInput" placeholder="Ex. User123" required>
        </mat-form-field>
      </div>
      <div class="form-floating">
        <mat-form-field class="example-full-width" appearance="fill">
          <mat-label>Your email address</mat-label>
          <input matInput formControlName="email" type="email" id="floatingInput" placeholder="Ex. name@example.com" required>
        </mat-form-field>
      </div>
      <div class="form-floating">
        <mat-form-field class="example-full-width" appearance="fill">
          <mat-label>Your password</mat-label>
          <input matInput formControlName="password" type="password" id="floatingPassword" placeholder="Password" required>
        </mat-form-field>
        <p style="color: red;" *ngIf="showError">Registration error. This login is already used</p>
        <p><a routerLink="/login">Have account? Sign In</a></p>
      </div>
      <button class="w-100 btn btn-lg btn-primary" type="submit" [disabled]="!form.valid">Registration</button>
    </form>
  </main>
</body>

</html>
